<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>針頭計數 - 極簡版</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .blue { background: #1e3c72; color: white; }
        .green { background: #10b981; color: white; }
        .gray { background: #666; color: white; }
        img, video { 
            width: 100%; 
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            margin: 10px 0;
        }
        .log {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .result {
            background: #1e3c72;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        .big { font-size: 48px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>💉 針頭計數器</h1>
    
    <div class="log" id="log">準備就緒...</div>
    
    <button class="blue" onclick="start()">1️⃣ 開啟相機</button>
    <video id="video" autoplay playsinline style="display:none"></video>
    
    <button class="blue" id="btn2" onclick="capture()" style="display:none">2️⃣ 拍照</button>
    <img id="photo" style="display:none">
    
    <button class="green" id="btn3" onclick="analyze()" style="display:none">3️⃣ AI 分析</button>
    
    <div id="result" class="result" style="display:none">
        <div>🟢 綠色: <span id="g">0</span></div>
        <div>🟣 紫色: <span id="p">0</span></div>
        <div class="big">總: <span id="t">0</span></div>
    </div>
    
    <button class="gray" onclick="location.reload()">🔄 重新開始</button>

    <script>
        let stream, img;
        
        function log(msg) {
            const d = new Date();
            const time = d.getHours() + ':' + d.getMinutes() + ':' + d.getSeconds();
            document.getElementById('log').innerHTML += `<div>[${time}] ${msg}</div>`;
            console.log(msg);
        }

        async function start() {
            log('正在請求相機權限...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').style.display = 'block';
                document.getElementById('btn2').style.display = 'block';
                log('✅ 相機已開啟');
            } catch (e) {
                log('❌ 相機錯誤: ' + e.message);
                alert('無法開啟相機: ' + e.message);
            }
        }

        function capture() {
            log('正在拍照...');
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            img = canvas.toDataURL('image/jpeg', 0.9);
            log('✅ 照片大小: ' + Math.round(img.length/1024) + ' KB');
            
            // 顯示照片
            document.getElementById('photo').src = img;
            document.getElementById('photo').style.display = 'block';
            
            // 關閉相機
            stream.getTracks().forEach(t => t.stop());
            document.getElementById('video').style.display = 'none';
            document.getElementById('btn2').style.display = 'none';
            
            // 顯示分析按鈕
            document.getElementById('btn3').style.display = 'block';
            log('✅ 準備分析，請點擊「AI 分析」');
        }

        async function analyze() {
            if (!img) {
                alert('沒有照片');
                return;
            }

            log('開始 AI 分析...');
            document.getElementById('btn3').disabled = true;

            try {
                log('準備圖片數據...');
                const base64 = img.split(',')[1];
                
                log('發送 API 請求...');
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 800,
                        messages: [{
                            role: 'user',
                            content: [{
                                type: 'image',
                                source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
                            }, {
                                type: 'text',
                                text: '數圖中綠色和紫色針頭數量。回應JSON: {"total":數字,"green":數字,"purple":數字}'
                            }]
                        }]
                    })
                });

                log('API 狀態: ' + response.status);

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error('API錯誤 ' + response.status + ': ' + err.substring(0, 100));
                }

                const data = await response.json();
                log('收到回應');

                const text = data.content[0].text.replace(/```json|```/g, '').trim();
                log('AI回應: ' + text.substring(0, 100));
                
                const r = JSON.parse(text);
                
                document.getElementById('g').textContent = r.green || 0;
                document.getElementById('p').textContent = r.purple || 0;
                document.getElementById('t').textContent = r.total || 0;
                document.getElementById('result').style.display = 'block';
                
                log('✅ 分析完成！總數: ' + (r.total || 0));

            } catch (e) {
                log('❌ 錯誤: ' + e.message);
                alert('分析失敗:\n' + e.message);
            } finally {
                document.getElementById('btn3').disabled = false;
            }
        }
    </script>
</body>
</html>
